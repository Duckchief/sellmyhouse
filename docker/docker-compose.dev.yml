services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: smh_dev
      POSTGRES_USER: smh
      POSTGRES_PASSWORD: smh_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smh"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
