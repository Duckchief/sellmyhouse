# docker/docker-compose.staging.yml
services:
  app-staging:
    image: ghcr.io/duckchief/sellmyhouse:staging
    container_name: app-staging
    expose:
      - "3000"
    env_file:
      - /opt/sellmyhouse/staging/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/uploads
      - /var/run/clamav/clamd.ctl:/var/run/clamav/clamd.ctl:ro
    restart: unless-stopped
    networks:
      - smh_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  smh_net:
    external: true

volumes:
  uploads:
