services:
  db-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: smh_test
      POSTGRES_USER: smh
      POSTGRES_PASSWORD: smh_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smh"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
