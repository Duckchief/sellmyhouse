services:
  db-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sellmyhomenow_test
      POSTGRES_USER: smhn
      POSTGRES_PASSWORD: smhn_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smhn"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
