# docker/nginx/conf.d/production.conf

server {
    listen 80;
    server_name sellmyhouse.sg www.sellmyhouse.sg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://sellmyhouse.sg$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sellmyhouse.sg www.sellmyhouse.sg;

    ssl_certificate     /etc/letsencrypt/live/sellmyhouse.sg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sellmyhouse.sg/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 15M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
      text/plain
      text/css
      text/xml
      text/javascript
      application/javascript
      application/json
      application/xml
      image/svg+xml;

    # Static assets — immutable cache (busted by ?v= query string)
    location ~* ^/(css|js|icons|images)/ {
        proxy_pass         http://app-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass         http://app-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_read_timeout 60s;
    }
}
